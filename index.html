<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Arquivos & Upload Git</title>
    <!-- Fonte Google Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-glow: rgba(59, 130, 246, 0.35);
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 580px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        /* Drag & Drop Dropzone */
        .dropzone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
        }

        .dropzone svg {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: var(--primary);
            stroke-width: 2;
            margin-bottom: 10px;
        }

        .dropzone p {
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .dropzone span {
            color: var(--text-muted);
            font-size: 0.8rem;
            display: block;
            margin-top: 4px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* Buttons */
        .btn {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Alerts & Status */
        .status-msg {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
            word-break: break-word;
        }

        .status-msg.success {
            display: block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        .status-msg.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .status-msg a {
            color: #60a5fa;
            text-decoration: underline;
        }

        .download-box {
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Central de Arquivos</h1>
            <p>Faça upload para um repositório Git ou baixe seu arquivo</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')">Upload para Git</button>
            <button class="tab-btn" onclick="switchTab('download')">Download</button>
        </div>

        <!-- ABA UPLOAD -->
        <div id="tab-upload" class="tab-content active">
            <form id="uploadForm" onsubmit="handleUpload(event)">
                
                <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p>Clique ou arraste o arquivo aqui</p>
                    <span>Suporta qualquer tipo de arquivo</span>
                </div>
                <input type="file" id="fileInput" onchange="onFileSelected(this)">

                <div class="file-info" id="fileInfo">
                    <span id="fileNameDisplay">Nenhum arquivo selecionado</span>
                    <strong id="fileSizeDisplay"></strong>
                </div>

                <button type="submit" class="btn" id="uploadBtn">
                    <span>Fazer Upload para a Vercel</span>
                </button>
            </form>

            <div id="statusMsg" class="status-msg"></div>
        </div>

        <!-- ABA DOWNLOAD -->
        <div id="tab-download" class="tab-content">
            <div class="download-box">
                <p style="color: var(--text-muted); margin-bottom: 20px;">
                    Clique no botão abaixo para baixar o arquivo disponibilizado.
                </p>

                <a class="btn" href="./litellm-1.93.0.dist-info.zip" download>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    Baixar Arquivo (.zip)
                </a>
            </div>
        </div>

    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            if (tab === 'upload') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('tab-upload').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('tab-download').classList.add('active');
            }
        }

        let selectedFile = null;

        function onFileSelected(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('fileNameDisplay').textContent = selectedFile.name;
                document.getElementById('fileSizeDisplay').textContent = formatBytes(selectedFile.size);
                document.getElementById('fileInfo').style.display = 'flex';
            }
        }

        // Drag and Drop
        const dropzone = document.getElementById('dropzone');
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                document.getElementById('fileInput').files = e.dataTransfer.files;
                onFileSelected(document.getElementById('fileInput'));
            }
        });

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function handleUpload(event) {
            event.preventDefault();
            const statusEl = document.getElementById('statusMsg');
            const btn = document.getElementById('uploadBtn');

            if (!selectedFile) {
                statusEl.className = 'status-msg error';
                statusEl.textContent = 'Por favor, selecione um arquivo para enviar.';
                return;
            }

            statusEl.className = 'status-msg';
            statusEl.style.display = 'block';
            statusEl.textContent = 'Enviando arquivo para o Vercel Blob...';
            btn.disabled = true;

            try {
                // Enviar o arquivo para a rota Vercel Blob (/api/upload)
                const res = await fetch(`/api/upload?filename=${encodeURIComponent(selectedFile.name)}`, {
                    method: 'POST',
                    body: selectedFile
                });

                const resData = await res.json();

                if (res.ok && resData.success) {
                    statusEl.className = 'status-msg success';
                    statusEl.innerHTML = `✅ ${resData.message}<br><br><a href="${resData.url}" target="_blank" style="color: #60a5fa; font-weight: bold; text-decoration: underline;">Baixar arquivo (${selectedFile.name})</a>`;
                } else {
                    throw new Error(resData.message || 'Erro ao processar upload no Vercel Blob.');
                }
            } catch (err) {
                statusEl.className = 'status-msg error';
                statusEl.textContent = `❌ Falha no upload: ${err.message}`;
            } finally {
                btn.disabled = false;
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    // Remove o prefixo "data:*/*;base64,"
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
</html>
