<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download de Arquivo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #0070f3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #0058c7;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Download do Arquivo</h1>
        <p>Clique no botão abaixo para baixar.</p>

        <a
            class="btn"
            href="./arquivos/meu_arquivo.zip"
            download>
            Baixar Arquivo
        </a>
    </div>

</body>
</html>
